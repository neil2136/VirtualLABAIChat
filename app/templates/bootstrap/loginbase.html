<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <!-- Meta, title, CSS, favicons, etc. -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}LAB tools{% endblock %}</title>

    <!-- Bootstrap -->
    {% block css %}　<!--css模块区域-->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendors/bootstrap/dist/css/bootstrap.min.css') }}">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendors/font-awesome/css/font-awesome.min.css') }}">
    <!-- NProgress -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendors/nprogress/nprogress.css') }}">
    <!-- iCheck -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendors/iCheck/skins/flat/green.css') }}">
    <!-- bootstrap-progressbar -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendors/bootstrap-progressbar/css/bootstrap-progressbar-3.3.4.min.css') }}">
    <!-- JQVMap -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendors/jqvmap/dist/jqvmap.min.css') }}">
    <!-- Custom Theme Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='build/css/custom.min.css') }}">
    <!-- Animate.css -->
    <link rel="stylesheet" href="{{ url_for('static', filename='vendors/animate.css/animate.min.css') }}">
    <!-- canvas style -->
     <link rel="stylesheet" href="{{ url_for('static', filename='canvas/style.css') }}">
    {% endblock %}
</head>
<body class="login">
<div id="container"> <canvas id="waterfall"></canvas> <div class="emma flex">
    {% for message in get_flashed_messages() %}
    <div class="alert alert-warning">
        <button type="button" class="close" data-dismiss="alert">&times;</button>
        {{ message }}
    </div>
    {% endfor %}
    {% block content %}<!--自定义模板区域-->
    {% endblock %}
</div>
</div>

<script type="text/javascript" src="{{ url_for('static', filename='js/canvas/pixi.min.js') }}"></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/canvas/tinycolor.min.js') }}"></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/canvas/index.js') }}"></script>

</body>
</html>
